# DroneRL Configuration
# All parameters for the RL engine, environment, and GUI
version: "1.1.1"

# Grid environment settings
environment:
  grid_rows: 12
  grid_cols: 12
  start_position: [0, 0]
  goal_position: [11, 11]
  obstacles: []

# Cell type definitions
cell_types:
  empty: 0
  building: 1
  trap: 2
  goal: 3
  wind: 4
  pit: 5

# Reward structure
rewards:
  step_penalty: -1
  goal_reward: 100
  trap_penalty: -50
  pit_penalty: -75
  wind_penalty: -2
  wall_collision: -5

# Algorithm selection (bellman | q_learning | double_q)
algorithm:
  name: "bellman"

# RL hyperparameters (shared across algorithms)
agent:
  learning_rate: 0.1
  discount_factor: 0.95
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995

# Q-Learning specific hyperparameters (decaying alpha)
q_learning:
  alpha_start: 0.5
  alpha_end: 0.05
  alpha_decay: 0.9995

# Double Q-Learning specific hyperparameters
double_q:
  alpha_start: 0.5
  alpha_end: 0.05
  alpha_decay: 0.9995
  # Probability of updating table A each step; 1 - p updates B. 0.5 = Hasselt 2010.
  update_a_probability: 0.5

# Training settings
training:
  max_episodes: 5000
  max_steps_per_episode: 200
  convergence_window: 100
  convergence_rate: 0.95
  min_episodes_before_converge: 200
  max_epsilon_for_converge: 0.05

# Wind zone settings
wind:
  drift_probability: 0.3

# Dynamic board / hazard generator settings
dynamic_board:
  enabled: false
  noise_level: 0.3        # 0..1 — wind drift intensity multiplier
  hazard_density: 0.15    # 0..0.5 — fraction of empty cells to fill with hazards
  difficulty: 0.5         # 0..1 — master multiplier (scales noise + density)
  trap_ratio: 0.3         # fraction of hazards that become traps
  pit_ratio: 0.2          # fraction of hazards that become pits
  wind_ratio: 0.3         # fraction of hazards that become wind
  building_ratio: 0.2     # fraction of hazards that become buildings
  seed: null              # integer for reproducibility, null = random
  randomize_per_episode: false  # if true, re-rolls hazards each episode

# GUI settings
gui:
  window_width: 1340
  window_height: 900
  grid_area_width: 780
  cell_size: 65
  fps: 60
  dashboard_width: 560
  reward_history_size: 100
  fast_mode_episodes_per_frame: 100
  demo_speed: 8
  status_bar_height: 40
  status_bar_font_size: 12
  font_name: "arial"

# Colors (RGB)
colors:
  background: [18, 18, 32]
  grid_line: [35, 35, 55]
  empty: [28, 30, 48]
  building: [85, 90, 100]
  building_accent: [110, 115, 125]
  trap: [200, 50, 50]
  trap_accent: [240, 80, 80]
  goal: [50, 200, 80]
  goal_accent: [80, 240, 110]
  wind: [55, 70, 160]
  wind_accent: [80, 100, 200]
  pit: [20, 20, 30]
  pit_accent: [80, 30, 90]
  drone: [255, 210, 40]
  drone_glow: [255, 240, 100]
  text: [210, 210, 230]
  text_dim: [120, 120, 150]
  dashboard_bg: [12, 14, 28]
  panel_border: [45, 50, 75]
  heatmap_low: [15, 20, 90]
  heatmap_mid: [240, 220, 30]
  heatmap_high: [240, 70, 20]
  accent: [100, 140, 255]
  btn_bg: [35, 38, 60]
  btn_hover: [50, 55, 85]
  btn_active: [70, 80, 130]
  start_marker: [100, 200, 255]
  white: [255, 255, 255]
  status_text: [220, 224, 240]
  status_dim: [160, 165, 190]
  graph_bg: [10, 10, 25]
  graph_zero: [60, 60, 70]
  banner_bg: [30, 90, 55]
  banner_border: [60, 180, 100]
  banner_text: [180, 255, 200]
  primary_btn: [45, 110, 65]
  primary_btn_hover: [55, 135, 80]
  primary_btn_border: [70, 180, 100]
  demo_btn: [40, 120, 180]
  editor_bar_bg: [20, 22, 38]
  editor_unselected: [40, 42, 62]
  editor_unselected_border: [65, 70, 90]
  editor_label: [220, 222, 240]
  editor_hint: [100, 105, 130]
  trail_glow: [100, 220, 255]
  trail_line: [100, 200, 255]
  trail_dot: [140, 220, 255]
  arrow_fill: [255, 255, 255]

# Logging
logging:
  level: INFO
  file: null

# Comparison settings (Assignment 2)
comparison:
  max_episodes: 5000
  smoothing_window: 50
  output_dir: results/comparison

# Analysis-sweep parallelism (§15 + §5.2). Caps the multiprocessing.Pool size
# in analysis/_runner.py so the rate-limit policy lives in config, not in
# os.cpu_count(). Default 4 is conservative for 4-8 core dev machines.
analysis:
  max_parallel_workers: 4

# Paths
paths:
  brain: results/brain.npy
