# DroneRL Configuration
# All parameters for the RL engine, environment, and GUI

# Grid environment settings
environment:
  grid_rows: 12
  grid_cols: 12
  start_position: [0, 0]
  goal_position: [11, 11]
  obstacles: []

# Cell type definitions
cell_types:
  empty: 0
  building: 1
  trap: 2
  goal: 3
  wind: 4

# Reward structure
rewards:
  step_penalty: -1
  goal_reward: 100
  trap_penalty: -50
  wind_penalty: -2
  wall_collision: -5

# RL hyperparameters
agent:
  learning_rate: 0.1
  discount_factor: 0.95
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995

# Training settings
training:
  max_episodes: 5000
  max_steps_per_episode: 200
  convergence_window: 100
  convergence_rate: 0.95
  min_episodes_before_converge: 200
  max_epsilon_for_converge: 0.05

# Wind zone settings
wind:
  drift_probability: 0.3

# GUI settings
gui:
  window_width: 1100
  window_height: 780
  grid_area_width: 660
  cell_size: 55
  fps: 60
  dashboard_width: 440
  reward_history_size: 100
  fast_mode_episodes_per_frame: 100
  demo_speed: 8
  status_bar_height: 40
  status_bar_font_size: 12

# Colors (RGB)
colors:
  background: [18, 18, 32]
  grid_line: [35, 35, 55]
  empty: [28, 30, 48]
  building: [85, 90, 100]
  building_accent: [110, 115, 125]
  trap: [200, 50, 50]
  trap_accent: [240, 80, 80]
  goal: [50, 200, 80]
  goal_accent: [80, 240, 110]
  wind: [55, 70, 160]
  wind_accent: [80, 100, 200]
  drone: [255, 210, 40]
  drone_glow: [255, 240, 100]
  text: [210, 210, 230]
  text_dim: [120, 120, 150]
  dashboard_bg: [12, 14, 28]
  panel_border: [45, 50, 75]
  heatmap_low: [15, 20, 90]
  heatmap_mid: [240, 220, 30]
  heatmap_high: [240, 70, 20]
  accent: [100, 140, 255]
  btn_bg: [35, 38, 60]
  btn_hover: [50, 55, 85]
  btn_active: [70, 80, 130]
  start_marker: [100, 200, 255]

# Logging
logging:
  level: INFO
  file: null

# Paths
paths:
  brain: data/brain.npy
